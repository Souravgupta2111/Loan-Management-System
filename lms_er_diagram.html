.er-wrap { padding: 8px 0 16px; }

}
.tab-btn.active {

  border-color: var(--color-border-primary); font-weight: 500;
}
.er-panel { display: none; }
.er-panel.active { display: block; }

.leg-dot { width: 10px; height: 10px; border-radius: 2px; }
</style>

<div class="er-wrap">
  <div class="tab-row">
    <button class="tab-btn active" onclick="show('users')">Users &amp; profiles</button>
    <button class="tab-btn" onclick="show('loans')">Loans core</button>
    <button class="tab-btn" onclick="show('repay')">Repayments</button>
    <button class="tab-btn" onclick="show('docs')">Documents &amp; KYC</button>
    <button class="tab-btn" onclick="show('comms')">Comms &amp; audit</button>

  <div class="er-panel active" id="panel-users"></div>

  startOnLoad: false,

  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '12px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#1e1e1c' : '#f7f6f2',
    primaryBorderColor: dark ? '#444441' : '#c8c6bc',
    primaryTextColor: dark ? '#c2c0b6' : '#3d3d3a',
    attributeBackgroundColorEven: dark ? '#2a2a28' : '#faf9f6',

async function renderAll() {
  for (const [key, src] of Object.entries(diagrams)) {
    const id = `mermaid-${key}-${Date.now()}`;
    try {
      const { svg } = await mermaid.render(id, src);
      document.getElementById(`panel-${key}`).innerHTML = svg;
      polish(`panel-${key}`);
    } catch(e) {
      document.getElementById(`panel-${key}`).innerHTML = `<p style="color:var(--color-text-danger);font-size:12px">Render error: ${e.message}</p>`;
    }
  }
}

function polish(panelId) {
  const panel = document.getElementById(panelId);
  panel.querySelectorAll('svg .node').forEach(node => {
    const fp = node.querySelector('path[d]');
    if (!fp) return;
    const nums = fp.getAttribute('d').match(/-?[\d.]+/g)?.map(Number);
    if (!nums || nums.length < 8) return;
    const xs = [nums[0],nums[2],nums[4],nums[6]];
    const ys = [nums[1],nums[3],nums[5],nums[7]];
    const x = Math.min(...xs), y = Math.min(...ys);
    const w = Math.max(...xs)-x, h = Math.max(...ys)-y;
    const r = document.createElementNS('http://www.w3.org/2000/svg','rect');
    r.setAttribute('x',x); r.setAttribute('y',y);
    r.setAttribute('width',w); r.setAttribute('height',h); r.setAttribute('rx','8');
    for (const a of ['fill','stroke','stroke-width','class','style']) {
      if (fp.hasAttribute(a)) r.setAttribute(a, fp.getAttribute(a));
    }
    fp.replaceWith(r);
  });
  panel.querySelectorAll('svg .row-rect-odd path, svg .row-rect-even path').forEach(p => {
    p.setAttribute('stroke','none');
  });
}

window.show = function(key) {
  document.querySelectorAll('.er-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`panel-${key}`).classList.add('active');
  event.target.classList.add('active');
};

renderAll();
</script>
