openapi: 3.0.0
info:
  title: Income Tax Department
  description: Income Tax Department, Govt of India has provided PAN Verification
    Records to Indian citizens via DigiLocker. You can verify the correctness of your
    PAN data in real-time using this facility.
  version: 1.0.0
servers:
- url: https://sandbox.api-setu.in/
  description: Sandbox
- url: https://apisetu.gov.in/
  description: Production
tags:
- name: APIs
paths:
  /certificate/v3/pan/pancr:
    parameters:
    - name: X-APISETU-APIKEY
      in: header
      required: true
      schema:
        type: string
        example: demokey123456ABCD789
        default: demokey123456ABCD789
    - name: X-APISETU-CLIENTID
      in: header
      required: true
      schema:
        type: string
        example: in.gov.sandbox
        default: in.gov.sandbox
    - name: Content-Type
      in: header
      required: true
      schema:
        type: string
        example: application/json
        default: application/json
    post:
      tags:
      - APIs
      summary: API to verify PAN Verification Record.
      description: API to verify PAN Verification Record.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                example:
                  chapter: '1'
                  productDescriptionImportPolicy:
                  - importPolicy: Restricted
                    hsCode: 1013020
                    policyCondition: None
                    description: Livestock
                    notificationNumber: null
                    notificationDate: None
                  description: LIVE ANIMALS
                  main: []
                  poliicyCondition:
                  - notes: An application for grant of a licence for import of Animals,
                      Birds and Reptiles (including their parts and products) may
                      be made in the ANF 2M of Appendices and Aayat Niryat Forms of
                      FTP (2015-20) to the Director General of Foreign Trade along
                      with the recommendation of the Chief Wild Life Warden of the
                      State concerned.
                    notificationNumber: null
                    slNo: 1
                    notificationDate: null
                  - notes: An application for grant of a licence for import of horses
                      for polo may be made in the ANF 2M of Appendices and Aayat Niryat
                      Forms of FTP (2015-20) to the Director General of Foreign Trade.
                    notificationNumber: null
                    slNo: 3
                    notificationDate: null
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                type: object
                example:
                  error: invalid_parameter
                  errorDescription: Bad request
        '401':
          description: Unauthorized access
          content:
            application/json:
              schema:
                type: object
                example:
                  error: invalid_authentication
                  errorDescription: Authentication failed
        '404':
          description: No Record Found
          content:
            application/json:
              schema:
                type: object
                example:
                  error: record_not_found
                  errorDescription: No record found!
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                example:
                  error: internal_server_error
                  errorDescription: Internal server error
        '502':
          description: Bad gateway
          content:
            application/json:
              schema:
                type: object
                example:
                  error: bad_gateway
                  errorDescription: Publisher service returned an invalid response.
        '503':
          description: Service Unavailable
          content:
            application/json:
              schema:
                type: object
                example:
                  error: service_unavailable
                  errorDescription: Publisher service is temporarily unavailable
        '504':
          description: Gateway timeout
          content:
            application/json:
              schema:
                type: object
                example:
                  error: gateway_timeout
                  errorDescription: Publisher service did not respond in time
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example:
                txnId: f7f1469c-29b0-4325-9dfc-c567200a70f7
                format: xml
                certificateParameters:
                  panno: ABCDE1234F
                  UID: '123456789012'
                  PANFullName: DEMO USER
                  FullName: DEMO USER
                  DOB: 01-01-1999
                  orgid: 001891
                  GENDER: Male
                consentArtifact:
                  consent:
                    consentId: ea9c43aa-7f5a-4bf3-a0be-e1caa24737ba
                    timestamp: '2024-12-12T05:43:43.809Z'
                    dataConsumer:
                      id: string
                    dataProvider:
                      id: string
                    purpose:
                      description: string
                    user:
                      idType: string
                      idNumber: string
                      mobile: '9988776655'
                      email: test@email.com
                    data:
                      id: string
                    permission:
                      access: string
                      dateRange:
                        from: '2024-12-12T05:43:43.809Z'
                        to: '2024-12-12T05:43:43.809Z'
                      frequency:
                        unit: string
                        value: 0
                        repeats: 0
                  signature:
                    signature: string
